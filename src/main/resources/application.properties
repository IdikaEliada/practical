spring.application.name=demo
# ===================================================
#  H2 In-Memory Database Configuration
# ===================================================

# Enable the H2 web console so you can inspect your data visually
spring.h2.console.enabled=true

# The JDBC URL for our in-memory database named "testdb"
spring.datasource.url=jdbc:h2:mem:testdb

# Automatically create/update the database schema based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update

# (Optional) Show SQL statements in the console for debugging
spring.jpa.show-sql=true

